[package]
name = "gouda"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "gouda"
crate-type = ["cdylib"]

[dependencies]
ndarray = "0.17.2"
numpy = "0.28.0"
pyo3 = { version = "0.28", features = ["extension-module"] }
